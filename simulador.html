<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>

```
<div class="container">
    <img src="Grok Image 2026-04-19 at 9.50.36 p.m..png" alt="Logo GITcash" class="logo">
    <h1>GIT CASH</h1>
    <p class="autor">Creado por: Daniel Orrala</p>

    <h2>Datos financieros</h2>

    <label for="txtIngresos">Ingresos:</label>
    <input type="number" id="txtIngresos" placeholder="Ej: 2000">
    <span class="error-msg" id="err_txtIngresos"></span>

    <label for="txtEgresos">Egresos:</label>
    <input type="number" id="txtEgresos" placeholder="Ej: 800">
    <span class="error-msg" id="err_txtEgresos"></span>

    <div class="resultado-row">
        <p>Disponible: <span id="spnDisponible" class="valor">—</span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago" class="valor">—</span></p>
    </div>

    <h2>Solicitud de crédito</h2>

    <label for="txtMonto">Monto ($ 100 – $ 100,000):</label>
    <input type="number" id="txtMonto" placeholder="Ej: 5000">
    <span class="error-msg" id="err_txtMonto"></span>

    <label for="txtPlazo">Plazo en años (1 – 30):</label>
    <input type="number" id="txtPlazo" placeholder="Ej: 3">
    <span class="error-msg" id="err_txtPlazo"></span>

    <label for="txtTasaInteres">Tasa de interés % (1 – 100):</label>
    <input type="number" id="txtTasaInteres" placeholder="Ej: 12">
    <span class="error-msg" id="err_txtTasaInteres"></span>

    <div class="resultado-row">
        <p>Interés a pagar: <span id="spnInteresPagar" class="valor">—</span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo" class="valor">—</span></p>
        <p>Cuota mensual: <span id="spnCuotaMensual" class="valor">—</span></p>
    </div>

    <p class="estado-label">Estado de crédito: <span id="spnEstadoCredito">ANALIZANDO...</span></p>

    <div class="buttons">
        <button onclick="calcular()" id="btnCalcularCredito">Calcular Crédito</button>
        <button onclick="reiniciar()" id="btnReiniciar">Reiniciar</button>
    </div>
</div>

<script src="funciones.js"></script>
<script src="simulador.js"></script>
```

</body>
</html>
